version: '3.8'

services:
  aipas-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: aipas-frontend-dev
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
    volumes:
      - .:/app
      - /app/node_modules
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/"]
      interval: 15s
      timeout: 5s
      retries: 3
