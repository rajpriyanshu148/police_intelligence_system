name: Backend CI Pipeline

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy bandit pytest pytest-asyncio pytest-cov
        pip install -r backend/requirements.txt

    - name: Run Black Formatter Check
      run: black --check backend/app/ backend/tests/

    - name: Run Ruff Linter Check
      run: ruff check backend/app/

    - name: Run MyPy Static Type Check
      run: mypy --ignore-missing-imports backend/app/

    - name: Run Bandit Security Check
      run: bandit -r backend/app/

    - name: Run Test Suite
      env:
        APP_ENV: testing
      run: |
        cd backend
        pytest tests/ -v
