app:
  name: "Agentic AI Police Intelligence and Assistance System"
  debug: true
  host: "127.0.0.1"
  port: 8000
  secret_key: "POLICE_INTEL_SUPER_SECRET_KEY_JWT"

database:
  # SQLite database path relative to project root
  url: "sqlite:///police_intel.db"

model:
  name_or_path: "Qwen/Qwen2.5-3B-Instruct"  # Base model path
  use_simulation: true                       # If true, uses fallback templates (great for running on local CPU without GPU)
  device: "cpu"                              # "cuda" or "cpu"
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  training:
    epochs: 3
    batch_size: 2
    learning_rate: 2e-4
    output_dir: "models/adapters"

vector_store:
  index_path: "data/faiss_index"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2" # Fast & small model for CPU execution

rag:
  top_k: 3
  sop_weight: 0.5
  bns_weight: 0.5
